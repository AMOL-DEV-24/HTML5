<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--! 2.Unorder List  -->
    <!--? type :  -->
    <!--? 1. type="disc" : Default -->
    <!--? 2. type="circle" : Circle -->
    <!--? 3. type="square" : Square -->
    <!--? 4. type="none" : No Bullet -->

    <!--* 1.Default -->
    <h4>1.Default</h4>
    <ul type="disc">
        <li>List 1</li>
        <li>List 2</li>
        <li>List 3</li>
        <li>List 4</li>
    </ul>

    <!--* 2.Circle -->
    <h4>2.Circle</h4>
    <ul type="circle">
        <li>List 1</li>
        <li>List 2</li>
        <li>List 3</li>
        <li>List 4</li>
    </ul>

    <!--* 3.Square -->
    <h4>3.Square</h4>
    <ul type="square">
        <li>List 1</li>
        <li>List 2</li>
        <li>List 3</li>
        <li>List 4</li>
    </ul>
    <!--* 4.No Bullet -->
    <h4>4.No Bullet</h4>
    <ul type="none">
        <li>List 1</li>
        <li>List 2</li>
        <li>List 3</li>
        <li>List 4</li>
    </ul>
    
</body>
</html>
